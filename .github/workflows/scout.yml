name: pan-adria-scout

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Google credentials
        run: printf '%s' '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run scout
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
